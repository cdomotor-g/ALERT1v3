<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>FW-LAB Surveying/Leveling</title>
<style>
body{font-family:Arial;margin:0;background:#10151c;color:#d7e0ea}.page{padding:1rem}.card{background:#17212b;border-radius:8px;padding:.9rem;margin-bottom:.8rem}
.muted{color:#9fb0c3}.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:.45rem}.grid3{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:.45rem}
label{font-size:.83rem;color:#9fb0c3}input,textarea,select{width:100%;background:#0f141a;color:#d7e0ea;border:1px solid #2a3948;border-radius:6px;padding:.35rem .45rem;box-sizing:border-box}
textarea{min-height:64px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #243243;padding:.35rem}th{text-align:left}
.num{width:100%;text-align:right}.back{background:#12263a}.inter{background:#17212b}.fore{background:#3a2a12}.toolbar{display:flex;gap:.45rem;flex-wrap:wrap}button{background:#1f6feb;color:white;border:0;padding:.42rem .7rem;border-radius:6px;cursor:pointer}
button.secondary{background:#334155}
</style></head><body><div class='page'>
<h2 style='margin-top:0'>Surveying/Leveling</h2>
<div class='muted' style='margin:-.2rem 0 .55rem'>Pass A: Field sheet layout + entry UX scaffold.</div>
__NAV__

<div class='card'>
  <h3 style='margin:.1rem 0 .6rem'>Header · General / Instrument / Setup</h3>
  <div class='grid'>
    <div><label>Date</label><input type='date' id='date'></div>
    <div><label>Crew</label><input id='crew'></div>
    <div><label>Station No.</label><input id='stationNo'></div>
    <div><label>Section No.</label><input id='sectionNo'></div>
    <div><label>Stream</label><input id='stream'></div>
    <div><label>Location</label><input id='location'></div>
    <div><label>Conditions</label><input id='conditions'></div>
    <div><label>Datum</label><input id='datum' value='AHD'></div>
    <div><label>Instrument Model</label><input id='model'></div>
    <div><label>Instrument Serial No.</label><input id='serial'></div>
    <div><label>Calibration Date</label><input type='date' id='calDate'></div>
    <div><label>Last Two Peg Test</label><input type='date' id='twoPegDate'></div>
    <div><label>Gauge Zero</label><input class='num' id='gaugeZero' value='0.000'></div>
    <div><label>Misclose (manual)</label><input class='num' id='misclose'></div>
  </div>
  <div style='margin-top:.5rem'><label>Description of Works</label><textarea id='works'></textarea></div>
</div>

<div class='card'>
  <h3 style='margin:.1rem 0 .6rem'>Survey Check / Notes</h3>
  <div class='grid3'>
    <div style='grid-column:span 2'><label>Notes</label><textarea id='notes'></textarea></div>
    <div>
      <label>Survey within acceptable range</label>
      <select id='surveyOk'>
        <option value='auto'>Auto</option>
        <option value='yes'>Yes</option>
        <option value='no'>No</option>
      </select>
    </div>
  </div>
</div>

<div class='card'>
  <div class='toolbar' style='margin-bottom:.5rem'>
    <button id='addRow'>Add Row</button>
    <button class='secondary' id='removeRow'>Remove Last Row</button>
  </div>
  <div class='muted' id='calcStatus' style='margin-bottom:.5rem'>Misclose: n/a</div>
  <table id='tbl'>
    <thead><tr>
      <th style='width:11%'>Back</th>
      <th style='width:11%'>Inter</th>
      <th style='width:11%'>Fore</th>
      <th style='width:11%'>Rise/Fall</th>
      <th style='width:12%'>Reduced Level (AHD)</th>
      <th style='width:12%'>Reduced Gauge Datum</th>
      <th style='width:10%'>Distance</th>
      <th>Remarks</th>
    </tr></thead>
    <tbody id='rows'></tbody>
  </table>
</div>

<script>
const rowsEl = document.getElementById('rows');
function rowTemplate(idx){
  return `<tr data-row='${idx}'>
    <td class='back'><input inputmode='decimal' class='num cell' data-col='back'></td>
    <td class='inter'><input inputmode='decimal' class='num cell' data-col='inter'></td>
    <td class='fore'><input inputmode='decimal' class='num cell' data-col='fore'></td>
    <td><input inputmode='decimal' class='num cell' data-col='risefall' placeholder='auto/manual'></td>
    <td><input inputmode='decimal' class='num cell' data-col='rl'></td>
    <td><input inputmode='decimal' class='num cell' data-col='rgd'></td>
    <td><input inputmode='decimal' class='num cell' data-col='dist'></td>
    <td><input class='cell' data-col='remarks'></td>
  </tr>`;
}
function addRow(){ rowsEl.insertAdjacentHTML('beforeend', rowTemplate(rowsEl.children.length)); }
function removeRow(){ if(rowsEl.lastElementChild) rowsEl.lastElementChild.remove(); }

function focusNextCell(cur){
  const cells=[...document.querySelectorAll('.cell')];
  const i=cells.indexOf(cur); if(i>=0 && i<cells.length-1) cells[i+1].focus();
}
rowsEl.addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){ e.preventDefault(); focusNextCell(e.target); }
});

function enforceNumeric(e){
  const col=e.target.dataset.col;
  if(['back','inter','fore','risefall','rl','rgd','dist'].includes(col)){
    e.target.value = e.target.value.replace(/[^0-9.\-]/g,'');
  }
}

function f3(v){ return Number.isFinite(v) ? v.toFixed(3) : ''; }
function num(v){ const n=parseFloat(v); return Number.isFinite(n)?n:null; }

function calc(){
  const rows=[...rowsEl.querySelectorAll('tr')];
  const gaugeZero=num(document.getElementById('gaugeZero').value) ?? 0;
  let startRL = null;
  let prevReading = null;
  let curRL = null;
  let sumBS=0, sumFS=0, cpCount=0;
  let inSetup=false;

  rows.forEach((tr)=>{
    tr.style.outline='none';
    const backEl=tr.querySelector("input[data-col='back']");
    const interEl=tr.querySelector("input[data-col='inter']");
    const foreEl=tr.querySelector("input[data-col='fore']");
    const rfEl=tr.querySelector("input[data-col='risefall']");
    const rlEl=tr.querySelector("input[data-col='rl']");
    const rgdEl=tr.querySelector("input[data-col='rgd']");

    const back=num(backEl.value), inter=num(interEl.value), fore=num(foreEl.value);
    const reading = back ?? inter ?? fore;
    const count = [back,inter,fore].filter(v=>v!==null).length;
    if(count>1){ tr.style.outline='2px solid #ef4444'; }

    // sequencing rules
    if(back!==null){
      if(inSetup){ tr.style.outline='2px solid #f59e0b'; }
      inSetup = true;
      sumBS += back;
    }
    if(inter!==null && !inSetup){ tr.style.outline='2px solid #f59e0b'; }
    if(fore!==null){
      if(!inSetup){ tr.style.outline='2px solid #f59e0b'; }
      else { inSetup = false; cpCount += 1; }
      sumFS += fore;
    }

    if(startRL===null){
      const rlProvided = num(rlEl.value);
      if(rlProvided!==null){ startRL=rlProvided; curRL=rlProvided; rgdEl.value=f3(curRL-gaugeZero); }
    }

    if(reading!==null && prevReading!==null && curRL!==null){
      const delta = prevReading - reading;
      if(!rfEl.matches(':focus') || rfEl.value==='') rfEl.value = f3(delta);
      const rfManual=num(rfEl.value);
      curRL = curRL + (rfManual ?? delta);
      if(!rlEl.matches(':focus')) rlEl.value = f3(curRL);
      rgdEl.value = f3(curRL-gaugeZero);
    } else if(curRL!==null && reading!==null && prevReading===null){
      if(!rlEl.matches(':focus')) rlEl.value = f3(curRL);
      rgdEl.value = f3(curRL-gaugeZero);
    }

    if(reading!==null) prevReading = reading;
  });

  const status=document.getElementById('calcStatus');
  const misclose = sumBS - sumFS;
  const tolerance = 0.001 * cpCount + 0.001;
  const ok = Math.abs(misclose) <= tolerance;
  status.textContent = `Misclose: ${f3(misclose)}  |  BS: ${f3(sumBS)}  FS: ${f3(sumFS)}  |  CP: ${cpCount}  Tol: ±${f3(tolerance)}m  |  ${ok?'✅ Within tolerance':'⚠️ Outside tolerance'}`;
}

rowsEl.addEventListener('input', (e)=>{ enforceNumeric(e); calc(); });
document.getElementById('gaugeZero').addEventListener('input', calc);

document.getElementById('addRow').onclick=()=>{ addRow(); calc(); };
document.getElementById('removeRow').onclick=()=>{ removeRow(); calc(); };
for(let i=0;i<10;i++) addRow();
calc();
</script>
</div></body></html>
